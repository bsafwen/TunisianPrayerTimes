name: Ingest Prayer Times

on:
  # Run automatically on January 1st at 06:00 UTC each year
  schedule:
    - cron: "0 6 1 1 *"

  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      year:
        description: "Year to ingest (defaults to current year)"
        required: false
        default: ""
      concurrency:
        description: "Number of delegations to process in parallel"
        required: false
        default: "5"

permissions:
  contents: write # needed to push the generated CSV files back to the repo

jobs:
  ingest:
    name: Ingest prayer times
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6h hard cap (ingest takes ~5h for a full year)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history allows git to push back cleanly
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd scraper && bun install

      - name: Resolve target year
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            echo "year=${{ github.event.inputs.year }}" >> "$GITHUB_OUTPUT"
          else
            echo "year=$(date +%Y)" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${{ github.event.inputs.concurrency }}" ]; then
            echo "concurrency=${{ github.event.inputs.concurrency }}" >> "$GITHUB_OUTPUT"
          else
            echo "concurrency=5" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ingest script
        env:
          YEAR: ${{ steps.vars.outputs.year }}
          CONCURRENCY: ${{ steps.vars.outputs.concurrency }}
          DELAY_MS: "1000"
        run: cd scraper && bun src/ingest.ts

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No new files to commit. Everything was already up to date."
          else
            YEAR=${{ steps.vars.outputs.year }}
            COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
            git commit -m "Ingest prayer times ${YEAR} (${COUNT} files)"
            git push
            echo "Pushed ${COUNT} files to the repository."
          fi
